<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WoW Keybind Optimizer</title>
    <script>
      var stored = localStorage.getItem('app-locale')
      var nav = (navigator.language || 'en').toLowerCase()
      var locale = stored || (nav.indexOf('ru') === 0 ? 'ru' : 'en')
      location.replace('./' + locale + '/')
    </script>
    <meta http-equiv="refresh" content="0; url=./en/" />
  </head>
  <body></body>
</html>
